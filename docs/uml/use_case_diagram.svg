<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="720" viewBox="0 0 1100 720">
  <defs>
    <style>
      .title{font:700 28px Arial,sans-serif;fill:#0f172a}.actor{fill:#f8fafc;stroke:#0f766e;stroke-width:2}.system{fill:#f0fdfa;stroke:#0f766e;stroke-width:2;rx:18}.use{fill:#fff;stroke:#14b8a6;stroke-width:2}.text{font:14px Arial,sans-serif;fill:#111827}.small{font:12px Arial,sans-serif;fill:#475569}.line{stroke:#334155;stroke-width:2}.dash{stroke:#64748b;stroke-width:1.8;stroke-dasharray:6 5}.label{font:700 16px Arial,sans-serif;fill:#134e4a}
    </style>
  </defs>
  <text x="550" y="42" text-anchor="middle" class="title">UML Use Case Diagram</text>
  <rect x="250" y="80" width="760" height="590" class="system"/>
  <text x="630" y="112" text-anchor="middle" class="label">Charity &amp; Donation Management System</text>

  <!-- actors -->
  <circle cx="100" cy="170" r="28" class="actor"/><line x1="100" y1="198" x2="100" y2="285" class="line"/><line x1="55" y1="225" x2="145" y2="225" class="line"/><line x1="100" y1="285" x2="62" y2="340" class="line"/><line x1="100" y1="285" x2="138" y2="340" class="line"/><text x="100" y="370" text-anchor="middle" class="label">Admin</text>
  <circle cx="100" cy="475" r="28" class="actor"/><line x1="100" y1="503" x2="100" y2="590" class="line"/><line x1="55" y1="530" x2="145" y2="530" class="line"/><line x1="100" y1="590" x2="62" y2="645" class="line"/><line x1="100" y1="590" x2="138" y2="645" class="line"/><text x="100" y="675" text-anchor="middle" class="label">Donor</text>

  <!-- use cases -->
  <ellipse cx="425" cy="170" rx="115" ry="38" class="use"/><text x="425" y="175" text-anchor="middle" class="text">Manage Donors</text>
  <ellipse cx="650" cy="170" rx="125" ry="38" class="use"/><text x="650" y="175" text-anchor="middle" class="text">Manage Campaigns</text>
  <ellipse cx="860" cy="170" rx="125" ry="38" class="use"/><text x="860" y="175" text-anchor="middle" class="text">Manage Beneficiaries</text>
  <ellipse cx="425" cy="300" rx="115" ry="38" class="use"/><text x="425" y="305" text-anchor="middle" class="text">Record Donations</text>
  <ellipse cx="650" cy="300" rx="115" ry="38" class="use"/><text x="650" y="305" text-anchor="middle" class="text">Allocate Funds</text>
  <ellipse cx="860" cy="300" rx="115" ry="38" class="use"/><text x="860" y="305" text-anchor="middle" class="text">Generate Reports</text>
  <ellipse cx="425" cy="460" rx="115" ry="38" class="use"/><text x="425" y="465" text-anchor="middle" class="text">View Dashboard</text>
  <ellipse cx="650" cy="460" rx="115" ry="38" class="use"/><text x="650" y="465" text-anchor="middle" class="text">Validate Inputs</text>
  <ellipse cx="860" cy="460" rx="115" ry="38" class="use"/><text x="860" y="465" text-anchor="middle" class="text">Save/Load Files</text>

  <!-- actor associations -->
  <line x1="145" y1="225" x2="310" y2="170" class="line"/>
  <line x1="145" y1="225" x2="525" y2="170" class="line"/>
  <line x1="145" y1="225" x2="740" y2="170" class="line"/>
  <line x1="145" y1="225" x2="315" y2="300" class="line"/>
  <line x1="145" y1="225" x2="540" y2="300" class="line"/>
  <line x1="145" y1="225" x2="750" y2="300" class="line"/>
  <line x1="145" y1="225" x2="320" y2="460" class="line"/>
  <line x1="145" y1="530" x2="315" y2="300" class="line"/>

  <!-- includes -->
  <line x1="425" y1="338" x2="650" y2="422" class="dash"/>
  <text x="530" y="380" class="small">includes validation</text>
  <line x1="650" y1="338" x2="650" y2="422" class="dash"/>
  <line x1="425" y1="208" x2="860" y2="422" class="dash"/>
  <text x="735" y="388" class="small">writes text files</text>
  <line x1="860" y1="338" x2="860" y2="422" class="dash"/>
</svg>
